services:
  # Kafka & Zookeeper remain the same as the previous setup...
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    depends_on:
      - zookeeper

  # The Producer (Simulates the stream)
  producer:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    env_file:
      - .env
    tty: true 
    stdin_open: true
    command: tail -f /dev/null 
    depends_on:
      - kafka

  # The Consumer
  spark-processor:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/app
    env_file:
      - .env
    tty: true
    stdin_open: true
    command: tail -f /dev/null
    depends_on:
      - kafka
  
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/app
    ports:
      - "8502:8502"  # Streamlit default port
    env_file:
      - .env
    command: streamlit run src/Dashboard/app.py --server.port=8502 --server.address=0.0.0.0
    depends_on:
      - spark-processor
  
  # MongoDB Distributed Replica Set (3 nodes)
  mongodb-1:
    image: mongo:latest
    container_name: youtube-mongodb-1
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    command: mongod --replSet rs0 --bind_ip_all --keyFile /keyfile/mongodb.key --auth
    volumes:
      - mongo-1-data:/data/db
      - ./mongo-keyfile:/keyfile:ro
    networks:
      - default
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/admin -u admin -p password
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb-2:
    image: mongo:latest
    container_name: youtube-mongodb-2
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    command: mongod --replSet rs0 --bind_ip_all --keyFile /keyfile/mongodb.key --auth
    volumes:
      - mongo-2-data:/data/db
      - ./mongo-keyfile:/keyfile:ro
    networks:
      - default
    depends_on:
      - mongodb-1
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/admin -u admin -p password
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb-3:
    image: mongo:latest
    container_name: youtube-mongodb-3
    ports:
      - "27019:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    command: mongod --replSet rs0 --bind_ip_all --keyFile /keyfile/mongodb.key --auth
    volumes:
      - mongo-3-data:/data/db
      - ./mongo-keyfile:/keyfile:ro
    networks:
      - default
    depends_on:
      - mongodb-1
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/admin -u admin -p password
      interval: 10s
      timeout: 5s
      retries: 5

  # Replica Set Initializer
  mongodb-init:
    image: mongo:latest
    container_name: youtube-mongodb-init
    depends_on:
      mongodb-1:
        condition: service_healthy
      mongodb-2:
        condition: service_healthy
      mongodb-3:
        condition: service_healthy
    networks:
      - default
    command: >
      mongosh --host mongodb-1:27017 -u admin -p password --eval
      'rs.initiate({
        _id: "rs0",
        members: [
          {_id: 0, host: "mongodb-1:27017"},
          {_id: 1, host: "mongodb-2:27017"},
          {_id: 2, host: "mongodb-3:27017"}
        ]
      })'
    volumes:
      - .:/app

volumes:
  mongo-1-data:
  mongo-2-data:
  mongo-3-data:
