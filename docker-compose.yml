services:
  # Kafka & Zookeeper remain the same as the previous setup...
  zookeeper:
    image: bitnamilegacy/zookeeper:3.9.1
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes

  kafka:
    image: bitnamilegacy/zookeeper:3.9.1
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_ANONYMOUS_LOGIN=yes
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
    depends_on:
      - zookeeper

  # The Producer (Simulates the stream)
  producer:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/app
    env_file:
      - .env
    tty: true 
    stdin_open: true
    command: tail -f /dev/null 
    depends_on:
      - kafka

  # The Consumer
  spark-processor:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/app
    env_file:
      - .env
    tty: true
    stdin_open: true
    command: tail -f /dev/null
    depends_on:
      - kafka